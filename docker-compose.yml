services:
  db:
    image: postgres:16-alpine
    container_name: stratmaster_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stratmaster_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stratmaster_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main_api:app --host 0.0.0.0 --port 8000 --reload"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stratmaster_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: python -m backend.app.main_bot

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stratmaster_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: stratmaster_ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: >
      http frontend:80
      --domain=${NGROK_DOMAIN}
      --log=stdout
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    profiles:
      - ngrok

volumes:
  postgres_data: